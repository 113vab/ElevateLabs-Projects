<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Gradients -->
    <linearGradient id="viona-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="viona-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="viona-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    
    <!-- Glow -->
    <filter id="viona-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Orbital V Favicon Mark (g: x=-1, y=-1) -->
  <g transform="translate(-1, -1)">
    <!-- 1. The Orbit Circle (dashed, cyan gradient) -->
    <circle cx="25" cy="25" r="20" stroke="url(#viona-cyan)" stroke-width="2.5" stroke-dasharray="4 3" fill="none" opacity="0.9" transform="rotate(-20 25 25)" />
    
    <!-- 2. The Geometric V (Violet gradient) -->
    <path d="M14 15 L25 35 L36 15" stroke="url(#viona-violet)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#viona-glow)" />
    
    <!-- 3. The Overlapping Accent Ribbon (Pink gradient) -->
    <path d="M25 35 L36 15" stroke="url(#viona-pink)" stroke-width="6.5" stroke-linecap="round" fill="none" />
    
    <!-- 4. Orbital Node (Secure encryption packet key) -->
    <circle cx="43.5" cy="14" r="4" fill="#F472B6" filter="url(#viona-glow)" />
  </g>
</svg>
